# NGINX Load Balancer Configuration
# Distributes traffic to multiple API Gateway instances

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr redis_ui_flag: $is_redis_ui';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;  # Allow large file uploads

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # WebSocket connection upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Map to determine if /api/ request is from Redis UI
    map $http_referer $is_redis_ui {
        default 0;
        ~*/redis-ui 1;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=20r/s;

    # Upstream API Gateway cluster
    upstream api_gateway_cluster {
        # Load balancing method: least_conn (routes to server with fewest active connections)
        # Alternatives: round_robin (default), ip_hash (sticky sessions)
        least_conn;

        # API Gateway instances
        # Docker Compose will create these with the service name
        server api-gateway:8000 max_fails=3 fail_timeout=30s weight=1;
        
        # Note: When scaling with docker-compose up --scale api-gateway=3,
        # Docker's DNS will round-robin between instances automatically.
        # For production, list specific instances or use service discovery.

        # Keepalive connections to upstreams
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # Upstream for WebSocket connections with session affinity
    upstream api_gateway_websocket {
        # IP hash ensures same client always goes to same backend
        # This is crucial for WebSocket session continuity
        ip_hash;

        server api-gateway:8000 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # Upstream for management UIs
    upstream redis_ui {
        server redis-ui:5540;
    }

    upstream kafka_ui {
        server kafka-ui:8080;
    }

    upstream minio_console {
        server minio:9001;
    }

    # HTTP server - redirect to HTTPS (optional: comment out redirect to allow HTTP)
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # Uncomment to redirect HTTP to HTTPS
        # return 301 https://$server_name$request_uri;

        # For now, allow HTTP access (comment out below if using redirect above)

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Root location - REST API and static files
        location / {
            # Rate limiting
            limit_req zone=api_limit burst=200 nodelay;

            # Proxy to API Gateway cluster
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering (enabled for regular HTTP)
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Keep connections alive
            proxy_set_header Connection "";
        }

        # WebSocket endpoints - /ws/*
        location /ws/ {
            # Rate limiting for WebSocket connections
            limit_req zone=ws_limit burst=50 nodelay;

            # Proxy to WebSocket-specific upstream (with sticky sessions)
            proxy_pass http://api_gateway_websocket;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts for WebSocket connections
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;  # 1 hour
            proxy_read_timeout 3600s;  # 1 hour

            # Disable buffering for WebSocket
            proxy_buffering off;
            proxy_cache off;

            # Prevent proxy from closing connections
            proxy_set_header Connection "";
        }

        # Server-Sent Events endpoints - /events/*
        location /events/ {
            # Rate limiting
            limit_req zone=api_limit burst=100 nodelay;

            # Proxy to API Gateway cluster
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific settings (no buffering, long timeout)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;  # 1 hour for long-lived SSE connections

            # SSE requires chunked transfer
            chunked_transfer_encoding on;

            # Disable proxy buffering for real-time events
            proxy_set_header Connection "";
        }

        # Health check endpoint
        location /health {
            # No rate limiting on health checks
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;

            access_log off;  # Don't log health checks
        }

        # NGINX status endpoint (for monitoring)
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker networks
            deny all;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # HTTPS server with SSL
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name localhost;

        # SSL certificate and key
        ssl_certificate /etc/nginx/ssl/nginx-fe.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-fe.key;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Root location - REST API and static files
        location / {
            # Rate limiting
            limit_req zone=api_limit burst=200 nodelay;

            # Proxy to API Gateway cluster
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering (enabled for regular HTTP)
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Keep connections alive
            proxy_set_header Connection "";
        }

        # WebSocket endpoints - /ws/*
        location /ws/ {
            # Rate limiting for WebSocket connections
            limit_req zone=ws_limit burst=50 nodelay;

            # Proxy to WebSocket-specific upstream (with sticky sessions)
            proxy_pass http://api_gateway_websocket;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts for WebSocket connections
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;  # 1 hour
            proxy_read_timeout 3600s;  # 1 hour

            # Disable buffering for WebSocket
            proxy_buffering off;
            proxy_cache off;

            # Prevent proxy from closing connections
            proxy_set_header Connection "";
        }

        # Server-Sent Events endpoints - /events/*
        location /events/ {
            # Rate limiting
            limit_req zone=api_limit burst=100 nodelay;

            # Proxy to API Gateway cluster
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific settings (no buffering, long timeout)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;  # 1 hour for long-lived SSE connections

            # SSE requires chunked transfer
            chunked_transfer_encoding on;

            # Disable proxy buffering for real-time events
            proxy_set_header Connection "";
        }

        # Redis UI - /redis-ui/
        location /redis-ui {
            return 302 /redis-ui/;
        }

        # Redis UI API endpoints - /redis-ui/api/
        location /redis-ui/api/ {
            rewrite ^/redis-ui/api/(.*) /api/$1 break;
            proxy_pass http://redis_ui;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
        }

        # Root /api/ - route to Redis UI if referer is redis-ui, else API Gateway
        location /api/ {
            # Use error_page trick to conditionally route
            error_page 418 = @redis_ui_api;

            if ($is_redis_ui) {
                return 418;
            }

            # Default: pass to API Gateway
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Named location for Redis UI API calls
        location @redis_ui_api {
            proxy_pass http://redis_ui;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
        }

        location /redis-ui/ {
            # Use rewrite to handle subpath properly
            rewrite ^/redis-ui/(.*) /$1 break;
            proxy_pass http://redis_ui;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Disable compression so sub_filter can work
            proxy_set_header Accept-Encoding "";

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Disable buffering for WebSocket support
            proxy_buffering off;
            proxy_read_timeout 3600s;

            # Rewrite HTML content to fix absolute paths
            sub_filter_types text/html text/css application/javascript application/json;
            sub_filter_once off;
            sub_filter 'href="/' 'href="/redis-ui/';
            sub_filter 'src="/' 'src="/redis-ui/';
            sub_filter 'url(/' 'url(/redis-ui/';
            sub_filter '"/api/' '"/redis-ui/api/';
            sub_filter '"/static/' '"/redis-ui/static/';
            # Fix proxy path variable (only replace the string value, not variable name)
            sub_filter "var RIPROXYPATH = '';" "var RIPROXYPATH = '/redis-ui';";

            # Handle redirects to preserve subpath
            proxy_redirect / /redis-ui/;
        }

        # Kafka UI - /kafka-ui/
        location /kafka-ui {
            return 302 /kafka-ui/;
        }

        location /kafka-ui/ {
            # No trailing slash - preserve full path to upstream
            proxy_pass http://kafka_ui;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /kafka-ui;

            # Handle redirects to preserve subpath
            proxy_redirect / /kafka-ui/;
            proxy_redirect ~^/(.*)$ /kafka-ui/$1;

            # Handle redirects
            proxy_buffering off;
        }

        # MinIO Console - /minio/
        location /minio {
            return 302 /minio/;
        }

        location /minio/ {
            # Strip /minio/ and pass to root - MinIO console doesn't support subpath
            rewrite ^/minio/(.*) /$1 break;
            proxy_pass http://minio_console;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /minio;

            # WebSocket support for MinIO console
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Disable buffering
            proxy_buffering off;
            proxy_read_timeout 3600s;

            # Rewrite redirects to include subpath
            proxy_redirect / /minio/;
        }

        # Health check endpoint
        location /health {
            # No rate limiting on health checks
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;

            access_log off;  # Don't log health checks
        }

        # NGINX status endpoint (for monitoring)
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker networks
            deny all;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
