# NGINX Backend Load Balancer Configuration
# Internal load balancer distributing traffic to backend microservices
# Used by API Gateway instances to connect to backend services

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # WebSocket connection upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # =========================================================================
    # UPSTREAM DEFINITIONS - Backend Services
    # =========================================================================

    # Chat Service - WebSocket and HTTP
    upstream chat_service_cluster {
        least_conn;
        server chat-service:8001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Order Service - REST API
    upstream order_service_cluster {
        least_conn;
        server order-service:8002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Notification Service - SSE and HTTP
    upstream notification_service_cluster {
        least_conn;
        server notification-service:8003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Message Persistence Service - REST API
    upstream message_persistence_cluster {
        least_conn;
        server message-persistence-service:8004 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =========================================================================
    # CHAT SERVICE - Port 8001 (HTTP + WebSocket)
    # =========================================================================
    server {
        listen 8001;
        server_name chat-lb;

        location / {
            proxy_pass http://chat_service_cluster;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts for WebSocket
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        location /health {
            proxy_pass http://chat_service_cluster/health;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            access_log off;
        }
    }

    # =========================================================================
    # ORDER SERVICE - Port 8002 (HTTP)
    # =========================================================================
    server {
        listen 8002;
        server_name order-lb;

        location / {
            proxy_pass http://order_service_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://order_service_cluster/health;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            access_log off;
        }
    }

    # =========================================================================
    # NOTIFICATION SERVICE - Port 8003 (HTTP + SSE)
    # =========================================================================
    server {
        listen 8003;
        server_name notification-lb;

        location / {
            proxy_pass http://notification_service_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Regular endpoints
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_set_header Connection "";
        }

        # SSE endpoints need special handling
        location /events/ {
            proxy_pass http://notification_service_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE-specific settings
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;

            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://notification_service_cluster/health;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            access_log off;
        }
    }

    # =========================================================================
    # MESSAGE PERSISTENCE SERVICE - Port 8004 (HTTP)
    # =========================================================================
    server {
        listen 8004;
        server_name persistence-lb;

        location / {
            proxy_pass http://message_persistence_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://message_persistence_cluster/health;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            access_log off;
        }
    }

    # =========================================================================
    # BACKEND LB HEALTH CHECK - Port 8090
    # =========================================================================
    server {
        listen 8090;
        server_name backend-lb-health;

        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx-be","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.0/8;
            allow 172.16.0.0/12;  # Docker networks
            deny all;
        }
    }
}

# =========================================================================
# GRPC STREAM CONFIGURATION - User Service
# =========================================================================
stream {
    log_format grpc '$remote_addr - [$time_local] $protocol $status $bytes_sent $bytes_received $session_time upstream: $upstream_addr';

    access_log /var/log/nginx/grpc-access.log grpc;

    # User Service - gRPC
    upstream user_service_grpc {
        least_conn;
        server user-service:50051 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 50051;
        proxy_pass user_service_grpc;
        proxy_timeout 3s;
        proxy_connect_timeout 1s;
    }
}
