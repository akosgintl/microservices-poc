version: '3.8'

services:
  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================
  
  # Apache Kafka 4.0 with KRaft mode (no ZooKeeper)
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - microservices-net

  # Kafka UI - Web interface for Kafka management (optional but useful)
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - microservices-net

  # Redis for pub/sub between services
  redis:
    image: redis:7.4.1-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - microservices-net

  # Redis UI - Web interface for Redis management (optional but useful)
  redis-ui:
    image: redis/redisinsight:2.70
    container_name: redis-ui
    depends_on:
      - redis
    ports:
      - "5540:5540"
    networks:
      - microservices-net

  # Cassandra - Distributed NoSQL database for message persistence
  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    ports:
      - "9042:9042"  # CQL native transport port
    environment:
      CASSANDRA_CLUSTER_NAME: chat-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - microservices-net

   # MinIO - S3-compatible object storage for file uploads
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - microservices-net

  # =============================================================================
  # MICROSERVICES
  # =============================================================================

  # User Service - gRPC (internal service)
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    # Note: No container_name to allow multiple instances
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: 50051
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; channel = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(channel).result(timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - microservices-net

  # Chat Service - WebSocket (bidirectional real-time)
  # Supports horizontal scaling: docker-compose up -d --scale chat-service=3
  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    # Note: No container_name to allow multiple instances
    ports:
      - "8010-8019:8001"  # Port range for scaling (avoiding conflict with other services)
    environment:
      PORT: 8001
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: chat-files
      MINIO_USE_SSL: "false"
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: chat
      CASSANDRA_PORT: 9042
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # Order Service - REST + Kafka Producer
  # Supports horizontal scaling: docker-compose up -d --scale order-service=3
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    # Note: No container_name to allow multiple instances
    ports:
      - "8020-8029:8002"  # Port range for scaling (avoiding conflict with other services)
    environment:
      PORT: 8002
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # Notification Service - Kafka Consumer + SSE Broadcaster
  # Supports horizontal scaling: docker-compose up -d --scale notification-service=3
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    # Note: No container_name to allow multiple instances
    ports:
      - "8030-8039:8003"
    environment:
      PORT: 8003
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # Message Persistence Service - Kafka Consumer writing to Cassandra
  # Supports horizontal scaling: docker-compose up -d --scale message-persistence-service=3
  message-persistence-service:
    build:
      context: ./message-persistence-service
      dockerfile: Dockerfile
    # Note: No container_name to allow multiple instances
    ports:
      - "8040-8049:8004"
    environment:
      PORT: 8004
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: chat
      CASSANDRA_PORT: 9042
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # API Gateway - REST, WebSocket proxy, SSE proxy
  # Supports horizontal scaling: docker-compose up -d --scale api-gateway=3
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    # Note: No container_name to allow multiple instances
    ports:
      - "8000:8000"  # Port range for scaling (avoiding conflict with other services)
    environment:
      PORT: 8000
      USER_SERVICE_GRPC: user-service:50051
      CHAT_SERVICE_WS: ws://chat-service:8001
      ORDER_SERVICE_URL: http://order-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8003
      MESSAGE_PERSISTENCE_SERVICE_URL: http://message-persistence-service:8004
      REDIS_URL: redis://redis:6379
    depends_on:
      - user-service
      - chat-service
      - order-service
      - notification-service
      - redis
    volumes:
      - ./web-client:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

volumes:
  kafka_data:
  redis_data:
  cassandra_data:
  minio_data:

networks:
  microservices-net:
    driver: bridge
